<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스티치의 할 일 목록</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 로그인/회원가입 오버레이 -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <img src="stitch.png" alt="스티치" class="auth-stitch" />
      <h2 class="auth-title">오하나의 할 일</h2>
      <p class="auth-desc" id="auth-desc">로그인하고 시작해요!</p>
      <input type="email"    id="auth-email"    class="auth-input" placeholder="이메일" autocomplete="email" />
      <input type="password" id="auth-password" class="auth-input" placeholder="비밀번호 (6자 이상)" autocomplete="current-password" />
      <button id="auth-submit" class="auth-submit">로그인</button>
      <p id="auth-error" class="auth-error"></p>
      <p class="auth-switch-text">
        <span id="auth-switch-label">계정이 없으신가요?</span>
        <a href="#" id="auth-switch">회원가입</a>
      </p>

      <div class="auth-divider"><span>또는</span></div>

      <button id="github-btn" class="social-btn github-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub으로 계속하기
      </button>
      <button id="google-btn" class="social-btn google-btn">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google로 계속하기
      </button>
    </div>
  </div>

  <!-- 배경 버블 -->
  <div class="bubbles" id="bubbles"></div>

  <div class="container">

    <!-- 헤더 -->
    <header>
      <button id="logout-btn" class="logout-btn">로그아웃</button>
      <div class="stitch-face">
        <img src="stitch.png" alt="스티치" class="stitch-img" />
      </div>
      <h1 class="title">오하나의 할 일</h1>
      <p class="subtitle">오하나는 가족을 의미해. 가족은 서로를 포기하지 않아 🌺</p>
      <p class="date" id="date"></p>
    </header>

    <main>
      <!-- 입력 영역 -->
      <div class="input-card">
        <div class="input-row">
          <input
            type="text"
            id="todo-input"
            class="todo-input"
            placeholder="할 일을 적어봐요! 스티치가 도와줄게요 🐾"
            maxlength="100"
            autocomplete="off"
          />
          <button id="add-btn" class="add-btn" aria-label="추가">
            <span>+</span>
          </button>
        </div>
        <div class="priority-row">
          <span class="priority-label">우선순위</span>
          <div class="priority-btns" id="priority-btns">
            <button class="p-btn p-high" data-priority="high">🔴 높음</button>
            <button class="p-btn p-mid active" data-priority="mid">🟡 보통</button>
            <button class="p-btn p-low" data-priority="low">🟢 낮음</button>
          </div>
        </div>
      </div>

      <!-- 필터 탭 -->
      <div class="filter-tabs">
        <button class="tab active" data-filter="all">전체</button>
        <button class="tab" data-filter="active">진행중</button>
        <button class="tab" data-filter="done">완료</button>
      </div>

      <!-- 할 일 목록 -->
      <ul class="todo-list" id="todo-list"></ul>

      <p class="empty-msg" id="empty-msg">
        할 일이 없어요!<br />
        <span>스티치처럼 자유롭게 놀아요 🏄</span>
      </p>
    </main>

    <footer>
      <span id="counter" class="counter"></span>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
